<div class="max-w-4xl mx-auto p-6">
  <h1 class="text-3xl font-bold text-gray-900 mb-8">Checkout</h1>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- Order Summary -->
    <div class="card">
      <h2 class="text-xl font-semibold mb-4">Order Summary</h2>
      <div class="space-y-3">
        <div class="flex justify-between">
          <span class="text-gray-600">Product:</span>
          <span class="font-medium">{{ productName }}</span>
        </div>
        <div class="flex justify-between">
          <span class="text-gray-600">Unit Price:</span>
          <span class="font-medium">{{ price | number:'1.2-2' }}€</span>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-gray-600">Quantity:</span>
          <div class="flex items-center gap-2">
            <button (click)="updateQuantity(quantity() - 1)" 
                    class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">-</button>
            <span class="font-medium text-lg">{{ quantity() }}</span>
            <button (click)="updateQuantity(quantity() + 1)" 
                    class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">+</button>
          </div>
        </div>
        <div class="border-t pt-3 flex justify-between">
          <span class="text-lg font-semibold">Total:</span>
          <span class="text-2xl font-bold text-blue-600">{{ total | number:'1.2-2' }}€</span>
        </div>
      </div>
    </div>

    <!-- Payment Form -->
    <div class="card">
      <h2 class="text-xl font-semibold mb-4">Payment Details</h2>
      <form [formGroup]="paymentForm" (ngSubmit)="onConfirmPayment()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Card Number</label>
          <input type="text" formControlName="cardNumber" class="input-field" 
                 placeholder="4111111111111111" maxlength="19">
          <p class="text-xs text-gray-500 mt-1">Test cards: 4111111111111111 (John), 5500000000000004 (Jane)</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Card Holder Name</label>
          <input type="text" formControlName="cardHolder" class="input-field" placeholder="John Doe">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Expiry Date</label>
            <input type="text" formControlName="expiryDate" class="input-field" 
                   placeholder="MM/YY" maxlength="5">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">CVV</label>
            <input type="text" formControlName="cvv" class="input-field" 
                   placeholder="123" maxlength="4">
          </div>
        </div>
        <button type="submit" class="btn-primary w-full" 
                [disabled]="paymentForm.invalid || isProcessing()">
          @if (isProcessing()) {
            Processing...
          } @else {
            Confirm Payment - {{ total | number:'1.2-2' }}€
          }
        </button>
      </form>

      @if (orderResult()) {
        <div class="mt-4 p-4 rounded-lg" 
             [class]="orderResult()!.success ? 'bg-green-100 border border-green-400' : 'bg-red-100 border border-red-400'">
          <p [class]="orderResult()!.success ? 'text-green-800' : 'text-red-800'">
            {{ orderResult()!.message }}
          </p>
        </div>
      }
    </div>
  </div>
</div>
